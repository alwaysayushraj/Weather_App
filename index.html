<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div class="weather">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/047/203/241/small/3d-illustration-warm-weather-png.png"
                class="weather-icon"
                alt="Weather Icon">
                <h1 class="temp">25°C</h1>
                <p class="weather-condition"></p>
                <h2 class="city">New York, USA</h2>
        </div>
        <div class="error">
            <p>Invalid city name</p>
        </div>
        <div class="details">
            <div class="col">
                <img src="https://img.icons8.com/?size=100&id=18504&format=png&color=000000" alt="Humidity Icon">
                <div class="text">
                    <p class="humidity">65%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="https://img.icons8.com/?size=100&id=wGscuXAAEzt4&format=png&color=000000" alt="Wind Icon">
                <div class="text">
                <p class="wind-speed">15 km/hr</p>
                <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
    
    
   <div class="background">
        <span class="diamond"></span>
        <span class="diamond"></span>
        <span class="diamond"></span>
        <span class="diamond"></span>
        <span class="diamond"></span>
        <span class="diamond"></span>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
